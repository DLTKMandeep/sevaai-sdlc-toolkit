<svg viewBox="0 0 1100 1000" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: system-ui, -apple-system, sans-serif;">
  <title>sevaai-sdlc reference architecture</title>
  <desc>Flow diagram showing how a user trigger routes through Claude's skill resolution into either the orchestrator or a single stage, the runtime tools each stage uses (Glob, Read, Grep, LLM, Write, optional MCP), the output dossier, and the real-world products each of the 7 stages hands off to.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1000" fill="var(--bg-color, #0f172a)" opacity="0.5"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" fill="var(--text-color, #f1f5f9)" font-size="19" font-weight="700">sevaai-sdlc — Reference Architecture</text>
  <text x="550" y="52" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="11">Flow + tools used at each stage</text>

  <!-- ===== Row 1: Entry points ===== -->
  <text x="60" y="86" fill="var(--text-color-secondary, #94a3b8)" font-size="10" font-weight="700" letter-spacing="0.05em">USER ENTRY</text>

  <rect x="60" y="95" width="280" height="52" rx="8" fill="rgba(99,102,241,0.14)" stroke="#6366f1" stroke-width="1.4"/>
  <text x="200" y="118" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">Slash command</text>
  <text x="200" y="135" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">/sdlc Add OAuth signup</text>

  <rect x="410" y="95" width="280" height="52" rx="8" fill="rgba(99,102,241,0.14)" stroke="#6366f1" stroke-width="1.4"/>
  <text x="550" y="118" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">Natural language — full pipeline</text>
  <text x="550" y="135" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">"Run the full SDLC for OAuth signup"</text>

  <rect x="760" y="95" width="280" height="52" rx="8" fill="rgba(99,102,241,0.14)" stroke="#6366f1" stroke-width="1.4"/>
  <text x="900" y="118" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">Natural language — single stage</text>
  <text x="900" y="135" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">"Generate a threat model for ..."</text>

  <line x1="200" y1="147" x2="350" y2="180" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-indigo)"/>
  <line x1="550" y1="147" x2="450" y2="180" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-indigo)"/>
  <line x1="900" y1="147" x2="700" y2="180" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-indigo)"/>

  <!-- ===== Row 2: Skill Resolution ===== -->
  <rect x="350" y="180" width="400" height="52" rx="8" fill="rgba(99,102,241,0.20)" stroke="#6366f1" stroke-width="1.7"/>
  <text x="550" y="203" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Skill Resolution (Claude)</text>
  <text x="550" y="220" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">matches trigger phrase against SKILL.md frontmatter `description`</text>

  <line x1="450" y1="232" x2="280" y2="280" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-indigo)"/>
  <line x1="650" y1="232" x2="820" y2="280" stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow-indigo)"/>

  <!-- ===== Row 3: Orchestrator vs Single Stage ===== -->
  <rect x="60" y="280" width="440" height="84" rx="8" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1.4"/>
  <text x="280" y="306" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">sdlc-orchestrator skill</text>
  <text x="280" y="326" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">reads .sevaai-sdlc.yaml &#183; creates dossier folder</text>
  <text x="280" y="342" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">writes 00-index.md &#183; runs stages 1-&gt;7 in order</text>
  <text x="280" y="358" text-anchor="middle" fill="#fda4af" font-size="10" font-style="italic">halts pipeline if Security marks BLOCKING</text>

  <rect x="600" y="280" width="440" height="84" rx="8" fill="rgba(16,185,129,0.10)" stroke="#10b981" stroke-width="1.4"/>
  <text x="820" y="306" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Single stage skill</text>
  <text x="820" y="326" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">e.g., sdlc-security, sdlc-testing</text>
  <text x="820" y="342" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">runs only that stage's logic</text>
  <text x="820" y="358" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10" font-style="italic">writes its single artifact</text>

  <line x1="280" y1="364" x2="450" y2="402" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="820" y1="364" x2="650" y2="402" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Row 4: Stage Runner ===== -->
  <rect x="100" y="400" width="900" height="172" rx="10" fill="rgba(99,102,241,0.06)" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="550" y="425" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Stage Runner — the same engine runs every stage</text>
  <text x="550" y="442" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10">SKILL.md provides instructions &#183; templates/artifact.md provides skeleton &#183; the LLM does synthesis</text>

  <g font-family="system-ui">
    <rect x="125" y="465" width="135" height="82" rx="6" fill="rgba(99,102,241,0.16)" stroke="#6366f1" stroke-width="1.2"/>
    <text x="192" y="487" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Glob</text>
    <text x="192" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">discover files</text>
    <text x="192" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8" font-family="ui-monospace, monospace">README*</text>
    <text x="192" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8" font-family="ui-monospace, monospace">docs/**/*.md</text>
    <text x="192" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8" font-family="ui-monospace, monospace">src/**</text>

    <rect x="270" y="465" width="135" height="82" rx="6" fill="rgba(99,102,241,0.16)" stroke="#6366f1" stroke-width="1.2"/>
    <text x="337" y="487" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Read</text>
    <text x="337" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">open files</text>
    <text x="337" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">README, ADRs,</text>
    <text x="337" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">prior dossier</text>
    <text x="337" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">artifacts</text>

    <rect x="415" y="465" width="135" height="82" rx="6" fill="rgba(99,102,241,0.16)" stroke="#6366f1" stroke-width="1.2"/>
    <text x="482" y="487" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Grep</text>
    <text x="482" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">search code</text>
    <text x="482" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">find auth, api</text>
    <text x="482" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">handlers, db</text>
    <text x="482" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">migrations</text>

    <rect x="560" y="465" width="135" height="82" rx="6" fill="rgba(139,92,246,0.20)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="627" y="487" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">LLM call</text>
    <text x="627" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">synthesis</text>
    <text x="627" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">tier per stage:</text>
    <text x="627" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">fast / balanced /</text>
    <text x="627" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">deep</text>

    <rect x="705" y="465" width="135" height="82" rx="6" fill="rgba(16,185,129,0.16)" stroke="#10b981" stroke-width="1.2"/>
    <text x="772" y="487" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">MCP (optional)</text>
    <text x="772" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">live data</text>
    <text x="772" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">Jira, Linear,</text>
    <text x="772" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">GitHub, Datadog</text>
    <text x="772" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">if connected</text>

    <rect x="850" y="465" width="135" height="82" rx="6" fill="rgba(99,102,241,0.16)" stroke="#6366f1" stroke-width="1.2"/>
    <text x="917" y="487" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Write</text>
    <text x="917" y="503" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">save artifact</text>
    <text x="917" y="518" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">.sevaai-sdlc/</text>
    <text x="917" y="530" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">{slug}/</text>
    <text x="917" y="542" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="8">0N-stage.md</text>
  </g>

  <line x1="550" y1="572" x2="550" y2="610" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== Row 5: Output dossier ===== -->
  <rect x="280" y="610" width="540" height="100" rx="10" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="634" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Feature dossier</text>
  <text x="550" y="652" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="10" font-family="ui-monospace, monospace">.sevaai-sdlc/{feature-slug}/</text>
  <text x="305" y="675" fill="var(--text-color-secondary, #94a3b8)" font-size="9" font-family="ui-monospace, monospace">00-index.md  &#183;  01-requirements.md  &#183;  02-design.md  &#183;  03-development.md</text>
  <text x="305" y="690" fill="var(--text-color-secondary, #94a3b8)" font-size="9" font-family="ui-monospace, monospace">04-testing.md  &#183;  05-security.md  &#183;  06-deployment.md  &#183;  07-maintenance.md</text>

  <line x1="550" y1="710" x2="550" y2="745" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== Row 6: Hand-off ===== -->
  <text x="60" y="765" fill="var(--text-color-secondary, #94a3b8)" font-size="10" font-weight="700" letter-spacing="0.05em">HAND-OFF — each stage's artifact ships into your real toolchain</text>

  <g font-family="system-ui">

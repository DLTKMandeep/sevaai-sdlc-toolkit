    <text x="421" y="822" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Cursor</text>
    <text x="421" y="836" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Claude Code</text>
    <text x="421" y="850" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">GitHub Copilot</text>

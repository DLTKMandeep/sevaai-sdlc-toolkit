    <text x="129" y="822" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Jira</text>
    <text x="129" y="836" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Linear</text>
    <text x="129" y="850" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Notion</text>
    <text x="129" y="864" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Productboard</text>
    <text x="129" y="878" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Dovetail</text>
    <text x="129" y="892" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Atlassian Intel.</text>

    <rect x="206" y="780" width="138" height="180" rx="6" fill="rgba(16,185,129,0.10)" stroke="#10b981" stroke-width="1.2"/>
    <text x="275" y="800" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">2. Design</text>
    <text x="275" y="822" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Eraser AI</text>
    <text x="275" y="836" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Excalidraw</text>
    <text x="275" y="850" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Backstage</text>
    <text x="275" y="864" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">IriusRisk</text>
    <text x="275" y="878" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">Stoplight</text>
    <text x="275" y="892" text-anchor="middle" fill="var(--text-color-secondary, #94a3b8)" font-size="9">SwaggerHub</text>

